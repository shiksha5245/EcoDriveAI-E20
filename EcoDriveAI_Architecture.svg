<svg baseProfile="full" height="1600px" version="1.1" width="2200px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#0F172A" height="1600px" width="2200px" x="0" y="0" /><text fill="white" font-family="Arial" font-size="34px" font-weight="bold" x="520" y="70">EcoDriveAI - Complete AI Architecture</text><rect fill="#2563EB" height="220" rx="20" ry="20" stroke="white" stroke-width="3" width="330" x="100" y="180" /><text fill="white" font-size="22px" font-weight="bold" x="120" y="220">1 Synthetic Dataset</text><text fill="white" font-size="17px" x="120" y="255">• 6000 Indian Vehicles</text><text fill="white" font-size="17px" x="120" y="283">• Cars + Bikes</text><text fill="white" font-size="17px" x="120" y="311">• OBD-II Telemetry</text><text fill="white" font-size="17px" x="120" y="339">• Risk Labels</text><rect fill="#9333EA" height="220" rx="20" ry="20" stroke="white" stroke-width="3" width="330" x="520" y="180" /><text fill="white" font-size="22px" font-weight="bold" x="540" y="220">2 Feature Engineering</text><text fill="white" font-size="17px" x="540" y="255">• Thermal Stress Index</text><text fill="white" font-size="17px" x="540" y="283">• BS6 Detection</text><text fill="white" font-size="17px" x="540" y="311">• One-Hot Encoding</text><text fill="white" font-size="17px" x="540" y="339">• Data Cleaning</text><rect fill="#059669" height="220" rx="20" ry="20" stroke="white" stroke-width="3" width="330" x="940" y="180" /><text fill="white" font-size="22px" font-weight="bold" x="960" y="220">3 Machine Learning</text><text fill="white" font-size="17px" x="960" y="255">• Random Forest</text><text fill="white" font-size="17px" x="960" y="283">• Train/Test Split</text><text fill="white" font-size="17px" x="960" y="311">• Prediction</text><text fill="white" font-size="17px" x="960" y="339">• Accuracy</text><rect fill="#EA580C" height="220" rx="20" ry="20" stroke="white" stroke-width="3" width="330" x="1360" y="180" /><text fill="white" font-size="22px" font-weight="bold" x="1380" y="220">4 Explainability</text><text fill="white" font-size="17px" x="1380" y="255">• Feature Importance</text><text fill="white" font-size="17px" x="1380" y="283">• Confusion Matrix</text><text fill="white" font-size="17px" x="1380" y="311">• Classification Report</text><text fill="white" font-size="17px" x="1380" y="339">• SHAP Values</text><rect fill="#DC2626" height="220" rx="20" ry="20" stroke="white" stroke-width="3" width="330" x="1780" y="180" /><text fill="white" font-size="22px" font-weight="bold" x="1800" y="220">5 Decision Engine</text><text fill="white" font-size="17px" x="1800" y="255">• Risk Classification</text><text fill="white" font-size="17px" x="1800" y="283">• Vehicle Health Score</text><text fill="white" font-size="17px" x="1800" y="311">• E20 Compatibility</text><text fill="white" font-size="17px" x="1800" y="339">• Repair Advice</text><line stroke="#38BDF8" stroke-width="6" x1="430" x2="520" y1="290" y2="290" /><polygon fill="#38BDF8" points="520,290 502,282 502,298" /><line stroke="#38BDF8" stroke-width="6" x1="850" x2="940" y1="290" y2="290" /><polygon fill="#38BDF8" points="940,290 922,282 922,298" /><line stroke="#38BDF8" stroke-width="6" x1="1270" x2="1360" y1="290" y2="290" /><polygon fill="#38BDF8" points="1360,290 1342,282 1342,298" /><line stroke="#38BDF8" stroke-width="6" x1="1690" x2="1780" y1="290" y2="290" /><polygon fill="#38BDF8" points="1780,290 1762,282 1762,298" /><rect fill="#0EA5E9" height="250" rx="20" ry="20" stroke="white" stroke-width="3" width="420" x="310" y="700" /><text fill="white" font-size="22px" font-weight="bold" x="330" y="740">6 Voice AI (Muesli)</text><text fill="white" font-size="17px" x="330" y="775">• Speech Input</text><text fill="white" font-size="17px" x="330" y="803">• Regex Parsing</text><text fill="white" font-size="17px" x="330" y="831">• Vehicle Extraction</text><text fill="white" font-size="17px" x="330" y="859">• Telemetry Mapping</text><rect fill="#16A34A" height="250" rx="20" ry="20" stroke="white" stroke-width="3" width="420" x="900" y="700" /><text fill="white" font-size="22px" font-weight="bold" x="920" y="740">7 AI Diagnostics</text><text fill="white" font-size="17px" x="920" y="775">• Health Score</text><text fill="white" font-size="17px" x="920" y="803">• Risk Prediction</text><text fill="white" font-size="17px" x="920" y="831">• Dynamic Advisor</text><text fill="white" font-size="17px" x="920" y="859">• Rule Engine</text><rect fill="#7C3AED" height="250" rx="20" ry="20" stroke="white" stroke-width="3" width="420" x="1490" y="700" /><text fill="white" font-size="22px" font-weight="bold" x="1510" y="740">8 Deployment</text><text fill="white" font-size="17px" x="1510" y="775">• Gradio Interface</text><text fill="white" font-size="17px" x="1510" y="803">• PDF Report</text><text fill="white" font-size="17px" x="1510" y="831">• SHAP Plot</text><text fill="white" font-size="17px" x="1510" y="859">• Download Results</text><line stroke="#38BDF8" stroke-width="6" x1="730" x2="900" y1="820" y2="820" /><polygon fill="#38BDF8" points="900,820 882,812 882,828" /><line stroke="#38BDF8" stroke-width="6" x1="1320" x2="1490" y1="820" y2="820" /><polygon fill="#38BDF8" points="1490,820 1472,812 1472,828" /><line stroke="#38BDF8" stroke-width="6" x1="1945" x2="1945" y1="400" y2="560" /><polygon fill="#38BDF8" points="1945,560 1927,552 1927,568" /><line stroke="#38BDF8" stroke-width="6" x1="1945" x2="1700" y1="560" y2="700" /><polygon fill="#38BDF8" points="1700,700 1682,692 1682,708" /><line stroke="#38BDF8" stroke-width="6" x1="1600" x2="1600" y1="400" y2="560" /><polygon fill="#38BDF8" points="1600,560 1582,552 1582,568" /><line stroke="#38BDF8" stroke-width="6" x1="1600" x2="1110" y1="560" y2="700" /><polygon fill="#38BDF8" points="1110,700 1092,692 1092,708" /><line stroke="#38BDF8" stroke-width="6" x1="1110" x2="1110" y1="400" y2="560" /><polygon fill="#38BD